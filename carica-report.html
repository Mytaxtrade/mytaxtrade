<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carica Report - MyTaxTrading.com</title>

  <style>

    body{
      font-family:Arial,sans-serif;
      background:#f4f6f9;
      margin:0;
      padding:40px;
      color:#111827;
    }

    .container{
      max-width:700px;
      margin:auto;
      background:white;
      padding:40px;
      border-radius:24px;
      box-shadow:0 10px 40px rgba(0,0,0,0.08);
    }

    h1{
      margin-bottom:10px;
    }

    p{
      color:#6b7280;
      margin-bottom:30px;
    }

    input, select, textarea{
      width:100%;
      padding:14px;
      border-radius:12px;
      border:1px solid #d1d5db;
      margin-bottom:18px;
      font-size:15px;
    }

    button{
      width:100%;
      background:#111827;
      color:white;
      border:none;
      padding:16px;
      border-radius:14px;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
    }

    .note{
      font-size:13px;
      color:#6b7280;
      margin-top:20px;
    }

  </style>

</head>

<body>

<div class="container">

  <h1>Carica i tuoi report broker</h1>

  <p>
    Compila i dati richiesti e carica i report broker relativi all'anno fiscale da elaborare.
  </p>

  <form action="https://formspree.io/f/mojrwgoq" method="POST" enctype="multipart/form-data">

    <input type="text" name="nome" placeholder="Nome e cognome" required>

    <input type="email" name="email" placeholder="Email" required>

    <input type="text" name="codice_fiscale" placeholder="Codice fiscale" required>

    <select name="anno_fiscale" required>
      <option value="">Anno fiscale</option>
      <option>2025</option>
      <option>2024</option>
      <option>2023</option>
    </select>

    <select name="broker" required>
      <option value="">Broker utilizzati</option>
      <option>Fineco</option>
      <option>Interactive Brokers</option>
      <option>DEGIRO</option>
      <option>eToro</option>
      <option>Trade Republic</option>
      <option>Altro</option>
    </select>

    <input type="file" name="report_1" required>

    <input type="file" name="report_2">

    <input type="file" name="report_3">

    <textarea name="note" placeholder="Note aggiuntive" rows="5"></textarea>

    <button type="submit">
      Invia report
    </button>

  </form>

  <div class="note">
    Servizio di elaborazione dati per regime dichiarativo. Non forniamo consulenza fiscale o finanziaria.
  </div>

</div>

</body>
</html>
